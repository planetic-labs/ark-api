name: Build and Push Docker Image

on:
  release:
    types: [published, created]
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image-name: ark-api
            file: infra/api.Dockerfile
          - image-name: ark-db
            file: infra/postgres.Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: get_tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.ref_name }}"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          # Convert repository owner to lowercase for Docker image registry compatibility
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER_LOWERCASE" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.get_tag.outputs.owner }}/${{ matrix.image-name }}:${{ steps.get_tag.outputs.tag }}
            ghcr.io/${{ steps.get_tag.outputs.owner }}/${{ matrix.image-name }}:latest
          cache-from: type=gha,scope=${{ matrix.image-name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image-name }}
