name: Build and Push Docker Image

on:
  release:
    types: [published, created]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc48c0abd739ccc54992d59aa04f804e2648 # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c304967ebe5d29031005f7a21394c8b3ec3b9d6f # v3.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: get_tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.ref_name }}"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          # Convert repository owner to lowercase for Docker image registry compatibility
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER_LOWERCASE" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@ca2427b9d4ec95983d0d0f414f689e4c840748b0 # v5.4.0
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.get_tag.outputs.owner }}/ark-api:${{ steps.get_tag.outputs.tag }}
            ghcr.io/${{ steps.get_tag.outputs.owner }}/ark-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
