name: Build and Push Docker Image

on:
  release:
    types: [published, created]
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image-name: ark-api
            file: infra/docker/api.Dockerfile
          - image-name: ark-web
            file: infra/docker/web.Dockerfile
          - image-name: ark-db
            file: infra/docker/postgres.Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: get_tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.ref_name }}"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          # Convert repository owner to lowercase for Docker image registry compatibility
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER_LOWERCASE" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.get_tag.outputs.owner }}/${{ matrix.image-name }}:${{ steps.get_tag.outputs.tag }}
            ghcr.io/${{ steps.get_tag.outputs.owner }}/${{ matrix.image-name }}:latest
          cache-from: type=gha,scope=${{ matrix.image-name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image-name }}
