name: Dependabot uv lock update

on:
  pull_request:
    paths:
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  update-uv-lock:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Update uv lockfile
        run: |
          uv lock

      - name: Report lockfile update result
        run: |
          if git diff --quiet -- uv.lock; then
            echo "No changes to uv.lock"
          else
            echo "uv.lock was updated. Commit/push must be handled by a separate trusted workflow."
          fi
