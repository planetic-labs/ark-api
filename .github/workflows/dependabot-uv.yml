name: Dependabot uv lock update

on:
  pull_request:
    paths:
      - 'backend/pyproject.toml'

permissions:
  contents: read

jobs:
  update-uv-lock:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Update uv lockfile
        run: |
          uv lock --project backend

      - name: Report lockfile update result
        run: |
          if git diff --quiet -- backend/uv.lock; then
            echo "No changes to uv.lock"
          else
            echo "uv.lock was updated. Commit/push must be handled by a separate trusted workflow."
          fi
