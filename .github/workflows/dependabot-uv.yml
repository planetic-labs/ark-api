name: Dependabot uv lock update

on:
  pull_request:
    paths:
      - 'backend/pyproject.toml'

permissions:
  contents: read

jobs:
  update-uv-lock:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@1edb52594c857e2b5b13128931090f0640537287 # v5.3.0

      - name: Update uv lockfile
        run: |
          uv lock --project backend

      - name: Report lockfile update result
        run: |
          if git diff --quiet -- backend/uv.lock; then
            echo "No changes to uv.lock"
          else
            echo "uv.lock was updated. Commit/push must be handled by a separate trusted workflow."
          fi
