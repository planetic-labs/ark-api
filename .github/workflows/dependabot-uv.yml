name: Dependabot uv lock update

on:
  pull_request:
    paths:
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  update-uv-lock:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Update uv lockfile
        run: |
          uv lock

      - name: Report lockfile update result
        run: |
          if git diff --quiet -- uv.lock; then
            echo "No changes to uv.lock"
          else
            echo "uv.lock was updated. Commit/push must be handled by a separate trusted workflow."
          fi
