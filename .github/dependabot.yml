version: 2
updates:
  # 1. Python dependencies for backend
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # 2. Docker base images updates in Dockerfiles
  - package-ecosystem: "docker"
    directory: "/infra"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  # 3. GitHub Actions workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
