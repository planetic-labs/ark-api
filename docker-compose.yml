services:
  # Бэкенд (FastAPI)
  api:
    build:
      context: .
      dockerfile: infra/api.Dockerfile
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    networks:
      - planetic-net
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Прокидываем код бэкенда для авторелоада (Hot Reload)
      - .:/app
      - /app/.venv
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ark
      - REDIS_URL=redis://redis:6379/0
      - UV_CACHE_DIR=/tmp/uv-cache
      - UV_LINK_MODE=copy
      - UV_NO_SYNC=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "fastapi", "dev", "main.py", "--host", "0.0.0.0"]

  # База данных
  db:
    build:
      context: .
      dockerfile: infra/postgres.Dockerfile
    command: ["postgres", "-c", "shared_preload_libraries=pg_partman_bgw", "-c", "pg_partman_bgw.dbname=ark", "-c", "pg_partman_bgw.role=postgres"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ark
    networks:
      - planetic-net
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ark"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (для pub/sub и кэша)
  redis:
    image: redis:7-alpine
    networks:
      - planetic-net
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Воркер фоновых задач ARQ
  worker:
    build:
      context: .
      dockerfile: infra/api.Dockerfile
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    networks:
      - planetic-net
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ark
      - REDIS_URL=redis://redis:6379/0
      - UV_CACHE_DIR=/tmp/uv-cache
      - UV_LINK_MODE=copy
      - UV_NO_SYNC=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "arq", "core.worker.WorkerSettings"]

volumes:
  postgres_data:
  redis_data:

networks:
  planetic-net:
    external: true
