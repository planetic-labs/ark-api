services:
  # Бэкенд (FastAPI)
  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Прокидываем код бэкенда для авторелоада (Hot Reload)
      - ../backend:/app/backend
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ark
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: ["uv", "run", "--project", "backend", "fastapi", "dev", "backend/main.py", "--host", "0.0.0.0"]

  # База данных
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis (для pub/sub и кэша)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
