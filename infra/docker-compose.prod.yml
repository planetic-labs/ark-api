services:
  # Бэкенд (FastAPI)
  api:
    image: ghcr.io/${GH_OWNER:-planetic-labs}/ark-api:${IMAGE_TAG:-latest}
    restart: always
    networks:
      - planetic-net
    ports:
      - "${API_PORT:-8383}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: ["uv", "run", "--project", "backend", "fastapi", "run", "backend/main.py", "--host", "0.0.0.0", "--port", "8000"]

  # База данных PostgreSQL
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - planetic-net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis (для pub/sub, кэша и очередей)
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - planetic-net
    volumes:
      - redis_data:/data

  # Воркер фоновых задач ARQ
  worker:
    image: ghcr.io/${GH_OWNER:-planetic-labs}/ark-api:${IMAGE_TAG:-latest}
    restart: always
    networks:
      - planetic-net
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: ["uv", "run", "--project", "backend", "arq", "backend.core.worker.WorkerSettings"]

volumes:
  postgres_data:
  redis_data:

networks:
  planetic-net:
    external: true
