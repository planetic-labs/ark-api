services:
  # База данных PostgreSQL
  db:
    build:
      context: ..
      dockerfile: infra/docker/postgres.Dockerfile
    command: ["postgres", "-c", "shared_preload_libraries=pg_partman_bgw", "-c", "pg_partman_bgw.dbname=${POSTGRES_DB}", "-c", "pg_partman_bgw.role=${POSTGRES_USER}"]
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - planetic-net
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (для pub/sub, кэша и очередей)
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - planetic-net
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  # Init-контейнер для автоматического наката миграций Alembic
  db-migrate:
    image: ghcr.io/${GH_OWNER:-planetic-labs}/ark-api:${IMAGE_TAG:-latest}
    networks:
      - planetic-net
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "--project", "backend", "alembic", "-c", "backend/alembic.ini", "upgrade", "head"]

  # Бэкенд (FastAPI)
  api:
    image: ghcr.io/${GH_OWNER:-planetic-labs}/ark-api:${IMAGE_TAG:-latest}
    restart: always
    networks:
      - planetic-net
    ports:
      - "127.0.0.1:${API_PORT:-8383}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    command: ["uv", "run", "--project", "backend", "fastapi", "run", "backend/main.py", "--host", "0.0.0.0", "--port", "8000"]

  # Воркер фоновых задач ARQ
  worker:
    image: ghcr.io/${GH_OWNER:-planetic-labs}/ark-api:${IMAGE_TAG:-latest}
    restart: always
    networks:
      - planetic-net
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    command: ["uv", "run", "--project", "backend", "arq", "backend.core.worker.WorkerSettings"]

  # Веб-клиент (Next.js)
  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    restart: always
    networks:
      - planetic-net
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

networks:
  planetic-net:
    external: true
